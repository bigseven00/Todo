<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        /* Loading Screen */
        #loading-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .lay {
            font-size: 15px;
            text-align: center;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 250px;
            transform: translate(-50%, -50%);
            background: #edc9c9;
            border: 1px solid red;
            line-height: 23px;
            padding: 20px 40px;
            border-radius: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Popup Message */
        #popup {
            height: 400px;
            width: 380px;
            border: 0px solid;
            border-radius: 10px;
            margin-top: 0px;

        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <body>
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="spinner"></div>
            <p>Sending USDC...</p>
        </div>

        <!-- Popup Message -->
        <div id="popup" class="hidden">

            <div class="lay">
                <i class="fa-solid fa-circle-info" style="color: #e32400;"></i>


                You do not have enough BTC in your account to pay for transaction fees on Ethereum Mainnet network.
                <a href="">Buy BTC</a> or <a href="">deposit from another account</a>
            </div>
            <a href="deposit.html">

                <button
                    style="margin-top: 420px; width: 250px; height: 40px; margin-left: 60px; font-size: 14px; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; background-color: blue; border-radius: 30px; color: white;">
                    Deposit $250 BTC
                </button>

            </a>


        </div>
    </body>

    <script>
        // Wait for the DOM to load
        document.addEventListener("DOMContentLoaded", () => {
            const loadingScreen = document.getElementById("loading-screen");
            const popup = document.getElementById("popup");

            // Show loading screen for 3 seconds
            setTimeout(() => {
                loadingScreen.style.display = "none"; // Hide loading screen
                popup.classList.remove("hidden");    // Show popup
            }, 2000);
        });
    </script>

</html>
